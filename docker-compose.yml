services:
  postgres:
    image: postgres:16-alpine
    container_name: datac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datac_db}
      POSTGRES_USER: ${POSTGRES_USER:-datac_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datac_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datac_user} -d ${POSTGRES_DB:-datac_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: datac_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datac_db}
      POSTGRES_USER: ${POSTGRES_USER:-datac_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datac_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend

volumes:
  postgres_data:
